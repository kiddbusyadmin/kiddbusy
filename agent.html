<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>KiddBusy - Agent</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent-dim: #3d3478;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e2f0;
    --text-dim: #6b6b8a;
    --text-muted: #3a3a52;
    --user-bubble: #1a1a2e;
    --agent-bubble: #13131f;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 32px;
  }

  .login-logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .login-logo span {
    color: var(--accent);
  }

  .login-box {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
  }

  .login-box input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 14px 16px;
    outline: none;
    letter-spacing: 0.15em;
    transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .login-btn {
    background: var(--accent);
    border: none;
    color: white;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }

  .login-error {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--red);
    text-align: center;
    display: none;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .chip {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* QUICK ACTIONS */
  #quick-actions {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .quick-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.05);
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 820px;
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .msg-bubble {
    padding: 14px 18px;
    line-height: 1.65;
    font-size: 14px;
    max-width: 100%;
  }

  .msg.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid var(--accent-dim);
    color: var(--text);
    border-radius: 2px 2px 0 2px;
  }

  .msg.agent .msg-bubble {
    background: var(--agent-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 2px 2px 2px 0;
  }

  .msg-bubble pre {
    background: #0d0d17;
    border: 1px solid var(--border);
    padding: 14px;
    margin: 10px 0;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    color: #a8b2d8;
  }

  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: #0d0d17;
    padding: 2px 6px;
    color: var(--accent);
  }

  .msg-bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
  }
  .msg-bubble th, .msg-bubble td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .msg-bubble th {
    background: var(--surface);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  .msg-bubble strong { color: var(--text); font-weight: 600; }
  .msg-bubble em { color: var(--text-dim); }
  .msg-bubble h3 {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 14px 0 6px;
  }
  .msg-bubble ul, .msg-bubble ol {
    padding-left: 20px;
    margin: 8px 0;
  }
  .msg-bubble li { margin: 4px 0; }
  .msg-bubble a { color: var(--accent); text-decoration: none; }
  .msg-bubble a:hover { text-decoration: underline; }

  /* Tool use indicator */
  .tool-indicator {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--yellow);
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    padding: 4px 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tool-indicator::before {
    content: '⚙';
    font-size: 10px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--agent-bubble);
    border: 1px solid var(--border);
    width: fit-content;
  }
  .typing span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* INPUT */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    resize: none;
    min-height: 46px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: white;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 20px;
    cursor: pointer;
    height: 46px;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.1em;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    padding: 40px;
    text-align: center;
  }

  .empty-state .big-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .empty-state .tagline {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 420px;
    line-height: 1.6;
  }

  /* CLEAR BUTTON */
  #clear-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--text-muted);
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  #clear-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">KIDDB<span>U</span>SY - AGENT ACCESS</div>
  <div class="login-box">
    <input type="password" id="pass-input" placeholder="enter password" autocomplete="off" />
    <button class="login-btn" onclick="checkLogin()">AUTHENTICATE</button>
    <div class="login-error" id="login-error">access denied</div>
  </div>
</div>

<!-- MAIN -->
<div id="app" style="display:none; flex-direction:column; height:100vh; overflow:hidden;">

  <header>
    <div class="header-left">
      <div class="logo">KIDDB<span>U</span>SY</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="status-dot"></div>
        <div class="status-label">AGENT ONLINE</div>
      </div>
    </div>
    <div class="header-right">
      <a href="/admin.html" class="chip"><- ADMIN</a>
      <button id="clear-btn" onclick="clearChat()">CLEAR</button>
    </div>
  </header>

  <div id="quick-actions">
    <button class="quick-btn" onclick="sendQuick('Give me a business overview - submissions, reviews, sponsorships, and key metrics')">📊 Business overview</button>
    <button class="quick-btn" onclick="sendQuick('Find 3 actionable ways to increase sponsorship revenue this month')">💰 Grow revenue</button>
    <button class="quick-btn" onclick="sendQuick('Show me all pending submissions and tell me which ones to approve or reject and why')">📋 Review submissions</button>
    <button class="quick-btn" onclick="sendQuick('Are there any reviews awaiting approval? Summarize them and recommend which to publish')">⭐ Review queue</button>
    <button class="quick-btn" onclick="sendQuick('Who are our current sponsors and what plans are they on? Any at risk of churning?')">🤝 Sponsor health</button>
    <button class="quick-btn" onclick="sendQuick('What cities or categories have the most listing gaps? Where should we focus growth?')">🗺 Growth gaps</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big-label">KiddBusy Agent</div>
      <div class="tagline">Your autonomous business manager. Ask me anything about your listings, reviews, sponsors, or strategy - I have direct access to your data.</div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Ask the agent anything..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
    <div class="input-hint">↵ send - shift+↵ newline</div>
  </div>

</div>

<script src="agent.js"></script>
</body>
</html>
