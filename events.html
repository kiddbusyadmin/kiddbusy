<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KiddBusy Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --sun:#ffcf2f;
  --sky:#4ac6ff;
  --plum:#6c3fc5;
  --ink:#1a1230;
  --muted:#726684;
  --cream:#fff8ee;
  --card:#ffffff;
  --line:#eadffc;
  --ok:#1ea672;
  --warn:#bf7b11;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Nunito',sans-serif;background:radial-gradient(circle at 10% -20%,rgba(74,198,255,.2),transparent 35%),radial-gradient(circle at 90% -30%,rgba(108,63,197,.18),transparent 40%),var(--cream);color:var(--ink)}
nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#fff;border-bottom:2px solid var(--line);position:sticky;top:0;z-index:20;box-shadow:0 2px 14px rgba(108,63,197,.08)}
.logo{font-family:'Fredoka One',cursive;font-size:1.65rem;color:var(--plum);text-decoration:none}
.logo span{color:#ff5a5f}
.nav-actions{display:flex;gap:10px;align-items:center}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 12px;border-radius:11px;font-weight:800;font-family:'Nunito',sans-serif;text-decoration:none;cursor:pointer}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:var(--plum);border-color:var(--plum);color:#fff}
.btn.sun{background:var(--sun);border-color:#f0bd1b;color:#513900}
.container{max-width:1080px;margin:20px auto;padding:0 16px 40px}
.hero{background:linear-gradient(135deg,#6c3fc5,#4ac6ff);border:1px solid #8260c5;border-radius:22px;padding:24px 18px;color:#fff;box-shadow:0 12px 30px rgba(76,55,128,.22)}
.hero h1{margin:0;font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,4.4vw,2.6rem);line-height:1.05}
.hero p{margin:8px 0 0;max-width:780px;color:rgba(255,255,255,.92);font-weight:700}
.search-card{margin-top:14px;background:rgba(255,255,255,.98);border:1px solid rgba(255,255,255,.5);border-radius:16px;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-card input{flex:1;min-width:250px;border:1px solid #d8c9f4;border-radius:12px;padding:12px 13px;font-size:1rem;font-weight:700;color:var(--ink);font-family:'Nunito',sans-serif}
.quick-cities{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{border:none;background:rgba(255,255,255,.24);color:#fff;border-radius:999px;padding:7px 12px;font-weight:800;cursor:pointer}
.chip:hover{background:rgba(255,255,255,.35)}
.status-row{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center}
.status{color:#f4eeff;font-size:.86rem;font-weight:800;letter-spacing:.2px}
.geo-banner{
  margin-top:10px;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.55);
  border-radius:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.10);
  padding:8px 10px;
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.geo-banner.visible{display:flex}
.geo-banner-text{color:#5f4e8f;font-size:.78rem;font-weight:700;line-height:1.25}
.geo-banner-actions{display:inline-flex;align-items:center;gap:6px;flex-shrink:0}
.geo-banner-change{
  border:1px solid #d8c9f4;background:#fff;color:#6c3fc5;border-radius:999px;
  padding:4px 10px;font-size:.72rem;font-weight:800;cursor:pointer;
}
.geo-banner-close{
  border:none;background:transparent;color:#8f80b4;font-size:1rem;line-height:1;cursor:pointer;padding:2px 4px;
}
.grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:16px}
.event-card{display:grid;grid-template-columns:72px 1fr auto;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:0 8px 24px rgba(65,49,100,.08)}
.event-date{background:linear-gradient(180deg,#f2e8ff,#ebe0ff);border-radius:12px;padding:10px 7px;text-align:center;line-height:1.1;font-weight:900;border:1px solid #dfd0ff}
.event-date .m{font-size:.72rem;color:#6d4bbb;letter-spacing:.5px}
.event-date .d{font-size:1.4rem;color:#36255f}
.event-name{font-family:'Fredoka One',cursive;font-size:1.08rem;line-height:1.2}
.event-detail{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
.event-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.pill{font-size:.7rem;padding:5px 9px;border-radius:999px;font-weight:800;letter-spacing:.3px}
.pill.free{background:#e4fff2;color:#146947}
.pill.paid{background:#fff5e3;color:#8a6112}
.pill.ongoing{background:#ecf5ff;color:#1a649f}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.actions .btn{font-size:.78rem;padding:7px 10px}
.empty{padding:30px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px;font-weight:700}
.error-cta{margin-top:10px}
@media (max-width:820px){
  .event-card{grid-template-columns:60px 1fr}
  .event-meta{grid-column:1/-1;align-items:flex-start;flex-direction:row}
  .nav-actions .btn{padding:8px 10px;font-size:.83rem}
}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">Kidd<span>Busy</span></a>
  <div class="nav-actions">
    <a class="btn sun" href="/">Top Picks</a>
    <a class="btn" href="/blog/">Blog</a>
  </div>
</nav>

<div class="container">
  <section class="hero">
    <h1>Family Events, Without The Endless Scroll</h1>
    <p>Search your city and get upcoming family-friendly events with direct source links and share actions.</p>
    <div class="search-card">
      <input id="cityInput" placeholder="Enter city, state (e.g. Charlotte, NC)" />
      <button class="btn primary" onclick="runEventsSearch()">Load Events</button>
    </div>
    <div class="quick-cities">
      <button class="chip" onclick="quickCity('Houston, TX')">Houston, TX</button>
      <button class="chip" onclick="quickCity('Dallas, TX')">Dallas, TX</button>
      <button class="chip" onclick="quickCity('Charlotte, NC')">Charlotte, NC</button>
      <button class="chip" onclick="quickCity('Atlanta, GA')">Atlanta, GA</button>
      <button class="chip" onclick="quickCity('Orlando, FL')">Orlando, FL</button>
    </div>
    <div class="status-row">
      <div class="status" id="eventsFreshness"></div>
      <div class="status" id="eventsHint">Tip: use full city + state for best results.</div>
    </div>
    <div class="geo-banner" id="geoBanner" aria-live="polite">
      <div class="geo-banner-text" id="geoBannerText"></div>
      <div class="geo-banner-actions">
        <button class="geo-banner-change" onclick="changeGeoDetectedCity()">Change</button>
        <button class="geo-banner-close" aria-label="Dismiss" onclick="dismissGeoBanner()">×</button>
      </div>
    </div>
  </section>

  <section class="grid" id="eventsList"></section>
</div>

<script>
const SUPABASE_URL='https://wgwexzyqaiwosgraaczi.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indnd2V4enlxYWl3b3NncmFhY3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODEwNzUsImV4cCI6MjA4ODI1NzA3NX0.IS8u4SL1XeLh9KgD4c2Pl9BiGNg0zkiNauUzu_QtKH8';
const sb = supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const EVENTS_TTL_MS = 24*60*60*1000;

function qsCity(){const p=new URLSearchParams(location.search);return p.get('city')||''}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function safeSleep(ms){return new Promise(r=>setTimeout(r,ms))}
function toTitleCase(s){return String(s||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}
function normalizeCityInput(raw){
  const txt=String(raw||'').trim().replace(/\s+/g,' ');
  if(!txt) return '';
  const parts=txt.split(',').map(x=>x.trim()).filter(Boolean);
  if(parts.length===0) return '';
  const city=toTitleCase(parts[0]);
  const st=parts[1]?parts[1].toUpperCase().replace(/[^A-Z]/g,'').slice(0,2):'';
  return st?`${city}, ${st}`:city;
}
function cityBase(label){return String(label||'').split(',')[0].trim()}
function cityLikePattern(label){const base=cityBase(label);return base?`${base}%`:(String(label||'').trim()+'%')}
function normalizeCityLabel(v){return String(v||'').toLowerCase().replace(/[^a-z0-9\\s]/g,'').replace(/\\s+/g,' ').trim()}
function normalizeEventUrl(u){
  const raw=String(u||'').trim();if(!raw) return '';
  try{
    const x=new URL(raw);
    if(x.protocol!=='http:'&&x.protocol!=='https:') return '';
    const host=String(x.hostname||'').toLowerCase();
    const path=String(x.pathname||'').toLowerCase();
    if(host.includes('google.')&&(path.includes('/search')||path.includes('/maps')||path==='/'||path==='')) return '';
    return x.toString();
  }catch(_){return ''}
}
function extractFirstUrl(text){
  const all=String(text||'').match(/https?:\/\/[^\s)]+/ig)||[];
  for(const u of all){
    const clean=normalizeEventUrl(u);
    if(clean) return clean;
  }
  return '';
}
function startOfToday(){const d=new Date();d.setHours(0,0,0,0);return d}
function parseIsoDateLocal(v){if(!v) return null;const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})$/);if(!m) return null;return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),0,0,0,0)}
function monthToNumber(m){const x=String(m||'').trim().slice(0,3).toUpperCase();const map={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};return Object.prototype.hasOwnProperty.call(map,x)?map[x]:null}
function inferDate(month,day){const m=monthToNumber(month);const d=Number(day);if(m==null||!Number.isFinite(d)||d<1||d>31) return null;const now=new Date();const t=startOfToday();const c=new Date(now.getFullYear(),m,d,0,0,0,0);if(c<t && (t-c)>(120*24*60*60*1000)) c.setFullYear(c.getFullYear()+1);return c}
function isPastEvent(e){const today=startOfToday();if(e.ongoing){if(e.end_date) return e.end_date<today;return false;}const end=e.end_date||e.start_date;if(!end) return false;return end<today}
function normalizeEventRow(raw){
  const detail=String(raw.detail||'');
  const sourceUrl=normalizeEventUrl(raw.source_url||raw.url||raw.link||extractFirstUrl(detail))||'';
  const startDate=parseIsoDateLocal(raw.start_date)||inferDate(raw.month||raw.event_month,raw.day||raw.event_day);
  const endDate=parseIsoDateLocal(raw.end_date);
  const ongoingHint=/ongoing|runs through|daily|every weekend|through\s+\w+\s+\d{1,2}/i.test(detail);
  return {month:raw.month||raw.event_month||'',day:raw.day||raw.event_day||'',name:raw.name||'',detail,free:!!(raw.free||raw.is_free),source_url:sourceUrl,ongoing:!!raw.ongoing||ongoingHint,start_date:startDate,end_date:endDate};
}

function renderEvents(rows){
  const list=document.getElementById('eventsList');
  if(!rows.length){list.innerHTML='<div class="empty">No upcoming events found for this city yet. Try another nearby city.</div>';return;}
  list.innerHTML=rows.map(e=>{
    const finalUrl=normalizeEventUrl(e.source_url||'');
    const linkHtml=finalUrl
      ? `<a class="btn" href="${esc(finalUrl)}" target="_blank" rel="noopener noreferrer" onclick="track('event_source_click', document.getElementById('cityInput').value, '${esc(e.name)}')">Event Link</a>`
      : '<span class="btn" style="opacity:.65;cursor:default">Source unavailable</span>';
    return `<article class="event-card">
      <div class="event-date"><div class="m">${esc(e.month)}</div><div class="d">${esc(e.day)}</div></div>
      <div>
        <div class="event-name">${esc(e.name)}</div>
        <div class="event-detail">${esc(e.detail)}</div>
        <div class="actions">${linkHtml}<button class="btn" data-event-name="${esc(e.name)}" data-event-detail="${esc(e.detail)}" data-event-url="${esc(finalUrl)}" onclick="shareEventFromButton(this)">Share</button></div>
      </div>
      <div class="event-meta">
        <span class="pill ${e.free?'free':'paid'}">${e.free?'FREE':'Paid'}</span>
        ${e.ongoing?'<span class="pill ongoing">ONGOING</span>':''}
      </div>
    </article>`;
  }).join('');
}

function extractJsonArrayCandidate(text){const raw=String(text||'');if(!raw) return null;const cleaned=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'');for(let i=0;i<cleaned.length;i++){if(cleaned[i]!=='[') continue;let depth=0,inStr=false,escp=false;for(let j=i;j<cleaned.length;j++){const ch=cleaned[j];if(inStr){if(escp)escp=false;else if(ch==='\\')escp=true;else if(ch==='\"')inStr=false;continue;}if(ch==='\"'){inStr=true;continue;}if(ch==='[')depth++;else if(ch===']'){depth--;if(depth===0){const candidate=cleaned.slice(i,j+1).trim();try{const parsed=JSON.parse(candidate);if(Array.isArray(parsed)) return parsed;}catch(_){}break;}}}}return null;}

async function fetchEventsForCity(cityLabel,attempt){
  const res=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({city:cityLabel,type:'events',retry_attempt:attempt||1})});
  const data=await res.json();
  if(!res.ok||data.error) throw new Error((data&&data.error)?data.error:('Search failed ('+res.status+')'));
  const textBlocks=(data&&data.content?data.content:[]).filter(b=>b&&b.type==='text');
  const parsed=extractJsonArrayCandidate(textBlocks.map(b=>String(b.text||'')).join('\n'));
  if(!parsed) throw new Error('No JSON array in response');
  const events=parsed.map(normalizeEventRow).filter(e=>!isPastEvent(e));
  if(!events.length) throw new Error('Empty events payload');
  return events;
}

async function shareEvent(name, detail, url){
  const city=document.getElementById('cityInput').value||null;
  const cleanUrl=normalizeEventUrl(url)||normalizeEventUrl(extractFirstUrl(detail))||'';
  const text=cleanUrl?`${name}\n${detail}\n${cleanUrl}`:`${name}\n${detail}`;
  track('share_open',city,JSON.stringify({surface:'event',method:navigator.share?'native_share':'copy_clipboard',event_name:name,shared_url:cleanUrl||null}));
  if(navigator.share){
    try{await navigator.share({title:name,text:detail,url:cleanUrl||undefined});track('share_native_sent',city,JSON.stringify({surface:'event',method:'native_share',event_name:name,shared_url:cleanUrl||null}));return {ok:true,method:'native_share'};}catch(err){if(err&&err.name==='AbortError'){track('share_abandon',city,JSON.stringify({surface:'event',method:'native_share',reason:'native_cancelled',event_name:name,shared_url:cleanUrl||null}));return {ok:false,method:'cancelled'};}}
  }
  try{await navigator.clipboard.writeText(text);track('share_copy_ready',city,JSON.stringify({surface:'event',method:'copy_clipboard',event_name:name,shared_url:cleanUrl||null}));return {ok:true,method:'copy_clipboard'};}catch(_){if(cleanUrl){window.open(cleanUrl,'_blank','noopener');track('share_link_opened',city,JSON.stringify({surface:'event',method:'open_link_fallback',event_name:name,shared_url:cleanUrl}));return {ok:true,method:'open_link_fallback'};}track('share_abandon',city,JSON.stringify({surface:'event',method:'fallback_failed',reason:'no_supported_method',event_name:name,shared_url:cleanUrl||null}));return {ok:false,method:'failed'};}
}
function setShareButtonState(btn,label){if(!btn) return;const original=btn.getAttribute('data-original-label')||btn.textContent||'Share';if(!btn.getAttribute('data-original-label')) btn.setAttribute('data-original-label',original);btn.textContent=label;setTimeout(()=>{btn.textContent=original;},1400)}
async function shareEventFromButton(btn){const name=btn.getAttribute('data-event-name')||'';const detail=btn.getAttribute('data-event-detail')||'';const url=btn.getAttribute('data-event-url')||'';const r=await shareEvent(name,detail,url);if(!r||!r.ok) return;if(r.method==='native_share') setShareButtonState(btn,'Shared');else if(r.method==='copy_clipboard') setShareButtonState(btn,'Copied');else setShareButtonState(btn,'Opened')}

function isInternalTraffic(){try{const params=new URLSearchParams(window.location.search||'');if(params.get('kb_internal')==='1'){localStorage.setItem('kb_internal','1');return true;}if(localStorage.getItem('kb_internal')==='1') return true;if(navigator.webdriver) return true;const host=String(window.location.hostname||'').toLowerCase();if(host.endsWith('.netlify.app')||host==='localhost'||host==='127.0.0.1') return true;}catch(_){ }return false}
function track(event, city=null, value=null){const payload={event,city,value,session_id:(sessionStorage.getItem('kb_session')||((() => { const id=Math.random().toString(36).slice(2)+Date.now().toString(36); sessionStorage.setItem('kb_session',id); return id; })())),is_internal:isInternalTraffic(),source:isInternalTraffic()?'internal':'public',user_agent:navigator.userAgent||null,path:window.location.pathname||null};sb.from('analytics').insert(payload).then(({error})=>{if(!error) return;sb.from('analytics').insert({event,city,value,session_id:payload.session_id}).then(()=>{});});}

async function getCachedEvents(cityLabel){
  const pattern=cityLikePattern(cityLabel);
  const meta=await sb.from('events').select('city,last_refreshed').ilike('city',pattern).order('last_refreshed',{ascending:false}).limit(1);
  const top=meta&&meta.data&&meta.data[0]?meta.data[0]:null;
  const lastRefreshed=top?top.last_refreshed:null;
  const age=lastRefreshed?Math.round((Date.now()-new Date(lastRefreshed))/3600000):null;
  const isFresh=lastRefreshed && (Date.now()-new Date(lastRefreshed))<EVENTS_TTL_MS;

  const ev=await sb.from('events').select('*').ilike('city',pattern).order('id',{ascending:true});
  const normalized=(ev.data||[]).map(normalizeEventRow).filter(e=>!isPastEvent(e));
  return {events:normalized,lastRefreshed,age,isFresh};
}

function showLoadError(cityLabel){
  const list=document.getElementById('eventsList');
  list.innerHTML=`<div class="empty">Could not load events right now for <strong>${esc(cityLabel)}</strong>.<div class="error-cta"><button class="btn primary" onclick="runEventsSearch()">Try Again</button></div></div>`;
}

async function loadEventsForCity(rawCity){
  const freshEl=document.getElementById('eventsFreshness');
  const cityLabel=normalizeCityInput(rawCity);
  if(!cityLabel){freshEl.textContent='';document.getElementById('eventsList').innerHTML='<div class="empty">Enter a city above to load events.</div>';return;}

  try { localStorage.setItem('kb_last_city', cityLabel); } catch (_) {}
  document.getElementById('cityInput').value=cityLabel;
  document.getElementById('eventsList').innerHTML='<div class="empty">Loading events...</div>';
  freshEl.textContent='Checking local cache...';

  let cached={events:[],age:null,isFresh:false};
  try{cached=await getCachedEvents(cityLabel);}catch(_){cached={events:[],age:null,isFresh:false};}

  const hasCached=cached.events.length>=2;
  if(hasCached){
    renderEvents(cached.events);
    freshEl.textContent=cached.isFresh?(cached.age<1?'Just updated':`Updated ${cached.age}h ago`):(cached.age==null?'Showing cached events':`Showing cached events (${cached.age}h old), refreshing...`);
  }
  if(cached.isFresh) return;

  try{
    freshEl.textContent='Searching for events...';
    let events=null;
    let lastErr=null;
    for(let attempt=1;attempt<=3;attempt++){
      try{events=await fetchEventsForCity(cityLabel,attempt);break;}catch(e){lastErr=e;await safeSleep(attempt*500);}    }
    if(!events) throw (lastErr||new Error('Unable to fetch events'));

    const pattern=cityLikePattern(cityLabel);
    await sb.from('events').delete().ilike('city',pattern);
    const stamp=new Date().toISOString();
    const rows=events.map(e=>({city:cityLabel,month:e.month,day:e.day,name:e.name,detail:e.detail,is_free:e.free,source_url:e.source_url,ongoing:e.ongoing,start_date:e.start_date?e.start_date.toISOString().slice(0,10):null,end_date:e.end_date?e.end_date.toISOString().slice(0,10):null,last_refreshed:stamp}));
    let insertOk=false;
    try{const ins=await sb.from('events').insert(rows);insertOk=!ins.error;}catch(_){ }
    if(!insertOk){
      const fallbackRows=rows.map(r=>({city:r.city,month:r.month,day:r.day,name:r.name,detail:r.detail,is_free:r.is_free,last_refreshed:r.last_refreshed}));
      await sb.from('events').insert(fallbackRows);
    }

    renderEvents(events);
    freshEl.textContent='Just updated';
  }catch(_err){
    if(!hasCached){showLoadError(cityLabel);freshEl.textContent='';}
    else {freshEl.textContent=cached.age==null?'Showing cached events':`Showing cached events (${cached.age}h old)`;}
  }
}

function runEventsSearch(){const city=(document.getElementById('cityInput').value||'').trim();if(!city){alert('Enter a city first.');return;}loadEventsForCity(city)}
function quickCity(label){document.getElementById('cityInput').value=label;loadEventsForCity(label)}
function showGeoBanner(cityLabel){
  const banner=document.getElementById('geoBanner');
  const text=document.getElementById('geoBannerText');
  if(!banner||!text) return;
  if(localStorage.getItem('kb_geo_banner_dismissed')==='1') return;
  text.textContent=`Showing events for ${cityLabel} based on your location.`;
  banner.classList.add('visible');
}
function dismissGeoBanner(){const banner=document.getElementById('geoBanner');if(banner) banner.classList.remove('visible');localStorage.setItem('kb_geo_banner_dismissed','1')}
function changeGeoDetectedCity(){
  const banner=document.getElementById('geoBanner');
  if(banner) banner.classList.remove('visible');
  const input=document.getElementById('cityInput');
  if(input){input.focus();input.select();}
  track('geo_city_banner_change_click');
}
async function autoDetectEventsCity(){
  try{
    const input=document.getElementById('cityInput');
    if(!input) return '';
    const existing=normalizeCityInput(qsCity()||localStorage.getItem('kb_last_city')||input.value||'');
    if(existing) return existing;
    const res=await fetch('/api/geo-city');
    const data=await res.json();
    if(!res.ok||!data||!data.ok) return '';
    if(String(data.country_code||'').toUpperCase()!=='US') return '';
    const city=toTitleCase(data.city||'');
    const stateCode=String(data.state_code||'').toUpperCase().replace(/[^A-Z]/g,'').slice(0,2);
    if(!city||!stateCode) return '';
    const label=normalizeCityInput(`${city}, ${stateCode}`);
    if(!label) return '';
    try{localStorage.setItem('kb_last_city',label);}catch(_){}
    showGeoBanner(label);
    track('geo_city_autoselect',stateCode,normalizeCityLabel(city));
    return label;
  }catch(_){return '';}
}

document.addEventListener('DOMContentLoaded', function(){
  const initial = normalizeCityInput(qsCity() || localStorage.getItem('kb_last_city') || '');
  if(initial){document.getElementById('cityInput').value=initial;loadEventsForCity(initial);}
  else {
    document.getElementById('eventsList').innerHTML='<div class="empty">Detecting your city...</div>';
    autoDetectEventsCity().then(city=>{
      if(city){document.getElementById('cityInput').value=city;loadEventsForCity(city);}
      else {document.getElementById('eventsList').innerHTML='<div class="empty">Enter a city above to load events.</div>';}
    });
  }
  document.getElementById('cityInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); runEventsSearch(); }});
});
</script>
</body>
</html>
