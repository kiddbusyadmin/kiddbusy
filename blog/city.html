<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>KiddBusy City Guide</title>
<meta name="description" content="Top kid-friendly listings, latest events, and related guides for your city." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --sun: #ffcf2f;
  --sky: #4ac6ff;
  --plum: #6c3fc5;
  --tomato: #ff5a5f;
  --cream: #fff8ee;
  --ink: #1a1230;
  --muted: #7b6e8a;
  --card: #ffffff;
  --border: #eee5ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--ink); }
a { color: inherit; text-decoration: none; }
nav {
  position: sticky; top: 0; z-index: 30;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border-bottom: 3px solid var(--border); padding: 16px 24px;
}
.logo { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--plum); }
.logo span { color: var(--tomato); }
.nav-links { display: flex; gap: 18px; list-style: none; font-weight: 800; color: var(--muted); }
.nav-links a:hover { color: var(--plum); }
.hero {
  background: linear-gradient(135deg, #6c3fc5 0%, #4ac6ff 100%);
  color: white; padding: 42px 24px;
}
.hero-wrap { max-width: 980px; margin: 0 auto; }
.hero h1 { font-family: 'Fredoka One', cursive; font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 8px; }
.hero p { color: rgba(255,255,255,.92); max-width: 780px; }
.container { max-width: 980px; margin: 20px auto 48px; padding: 0 16px; }
.section { margin-bottom: 16px; background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 16px; }
.section h2 { font-size: 1.15rem; margin-bottom: 10px; color: var(--ink); }
.sub { color: var(--muted); font-size: .88rem; margin-top: -4px; margin-bottom: 10px; }
.grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
.item { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: #fff; }
.item-title { font-weight: 900; margin-bottom: 6px; line-height: 1.3; }
.item-meta { color: var(--muted); font-size: .83rem; line-height: 1.35; }
.pill { display:inline-block; margin-top:6px; background:#f2ebff; color:#4c2f8f; border-radius:999px; padding:3px 10px; font-size:.72rem; font-weight:900; }
.list-inline { display:flex; flex-wrap:wrap; gap:8px; }
.city-link { background:#eef8ff; color:#234; border:1px solid #d7ebff; padding:6px 10px; border-radius:999px; font-size:.8rem; font-weight:800; }
.empty, .state { padding: 14px; border-radius: 12px; background: #fff; border: 2px dashed var(--border); color: var(--muted); }
.backline { margin: 8px 0 12px; font-weight: 800; color: var(--plum); }
</style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Kidd<span>Busy</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/blog/" style="color:var(--plum)">Blog</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-wrap">
      <h1 id="heroTitle">City Guide</h1>
      <p id="heroSub">Top listings, latest events, and related local guides for families.</p>
    </div>
  </section>

  <main class="container">
    <a class="backline" href="/blog/">Back to blog</a>
    <div id="state" class="state">Loading city guide...</div>

    <section id="summary" class="section" style="display:none">
      <h2>Today at a glance</h2>
      <div id="summaryText" class="sub"></div>
    </section>

    <section id="listingsSection" class="section" style="display:none">
      <h2>Top Listings</h2>
      <div id="listings" class="grid"></div>
    </section>

    <section id="eventsSection" class="section" style="display:none">
      <h2>Latest Events</h2>
      <div id="events" class="grid"></div>
    </section>

    <section id="postsSection" class="section" style="display:none">
      <h2>Related Blog Posts</h2>
      <div id="posts" class="grid"></div>
    </section>

    <section id="crossSection" class="section" style="display:none">
      <h2>Explore Other Cities</h2>
      <div id="crossLinks" class="list-inline"></div>
    </section>
  </main>

<script>
const SUPABASE_URL = 'https://wgwexzyqaiwosgraaczi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indnd2V4enlxYWl3b3NncmFhY3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODEwNzUsImV4cCI6MjA4ODI1NzA3NX0.IS8u4SL1XeLh9KgD4c2Pl9BiGNg0zkiNauUzu_QtKH8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SESSION_ID = (() => {
  let id = sessionStorage.getItem('kb_session');
  if (!id) {
    id = Math.random().toString(36).slice(2) + Date.now().toString(36);
    sessionStorage.setItem('kb_session', id);
  }
  return id;
})();

function track(event, value) {
  sb.from('analytics').insert({
    event: event,
    city: null,
    value: value == null ? null : JSON.stringify(value),
    session_id: SESSION_ID
  }).then(function(){}).catch(function(){});
}

function esc(s) {
  return String(s || '').replace(/[&<>\"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'})[c];
  });
}

function normalizeExternalUrl(v) {
  var raw = String(v || '').trim();
  if (!raw) return '';
  if (/^https?:\/\//i.test(raw)) return raw;
  if (/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(raw)) return 'https://' + raw;
  return '';
}

function params() {
  var qp = new URLSearchParams(window.location.search);
  var city = qp.get('city');
  if (!city) {
    var m = window.location.pathname.match(/^\/blog\/city\/([^/]+)$/);
    if (m) city = decodeURIComponent(m[1]);
  }
  return { city: city || '' };
}

function fmtDate(v) {
  try { return new Date(v).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
  catch (_) { return String(v || ''); }
}

function renderHub(hub) {
  var state = document.getElementById('state');
  if (!hub) {
    state.className = 'empty';
    state.textContent = 'City guide not found.';
    return;
  }

  document.getElementById('heroTitle').textContent = (hub.city_display || hub.city || 'City') + ' Family Guide';
  document.getElementById('heroSub').textContent = 'Refreshed ' + esc(hub.refreshed_date || '') + ' with top listings, latest events, and related blog links.';

  document.getElementById('summary').style.display = 'block';
  document.getElementById('summaryText').textContent =
    (hub.summary && hub.summary.listings_count || 0) + ' active listings, ' +
    (hub.summary && hub.summary.events_count || 0) + ' current events, ' +
    (hub.summary && hub.summary.posts_count || 0) + ' related blog posts.';

  var listings = Array.isArray(hub.top_listings) ? hub.top_listings : [];
  var events = Array.isArray(hub.latest_events) ? hub.latest_events : [];
  var posts = Array.isArray(hub.related_posts) ? hub.related_posts : [];
  var cross = Array.isArray(hub.related_city_hubs) ? hub.related_city_hubs : [];

  document.getElementById('listingsSection').style.display = 'block';
  document.getElementById('listings').innerHTML = listings.length ? listings.map(function(r){
    var website = normalizeExternalUrl(r.website);
    var title = website
      ? '<a href="' + esc(website) + '" target="_blank" rel="noopener noreferrer">' + esc(r.name || '') + '</a>'
      : esc(r.name || '');
    return '<article class="item">' +
      '<div class="item-title">' + title + '</div>' +
      '<div class="item-meta">' + esc(r.category || '') + (r.address ? ' - ' + esc(r.address) : '') + '</div>' +
      '<div class="item-meta">Rating: ' + esc(r.rating || '--') + (r.is_sponsored ? ' - Sponsored' : '') + '</div>' +
      '</article>';
  }).join('') : '<div class="empty">No listings available yet for this city.</div>';

  document.getElementById('eventsSection').style.display = 'block';
  document.getElementById('events').innerHTML = events.length ? events.map(function(e){
    return '<article class="item">' +
      '<div class="item-title"><a href="' + esc(e.source_url || '#') + '" target="_blank" rel="noopener noreferrer">' + esc(e.name || '') + '</a></div>' +
      '<div class="item-meta">' + esc(e.month || '') + ' ' + esc(e.day || '') + (e.start_date ? ' - starts ' + fmtDate(e.start_date) : '') + '</div>' +
      '<div class="item-meta">' + esc(e.detail || '') + '</div>' +
      '<span class="pill">' + (e.is_free ? 'Free' : 'Paid/Varies') + (e.ongoing ? ' - Ongoing' : '') + '</span>' +
      '</article>';
  }).join('') : '<div class="empty">No current events found. Check back later today.</div>';

  document.getElementById('postsSection').style.display = 'block';
  document.getElementById('posts').innerHTML = posts.length ? posts.map(function(p){
    return '<article class="item">' +
      '<div class="item-title"><a href="/blog/' + encodeURIComponent(p.slug || '') + '">' + esc(p.title || '') + '</a></div>' +
      '<div class="item-meta">' + esc(p.city_display || p.city || '') + (p.published_at ? ' - ' + fmtDate(p.published_at) : '') + '</div>' +
      '<div class="item-meta">' + esc(p.excerpt || '') + '</div>' +
      '<a class="pill" href="/blog/' + encodeURIComponent(p.slug || '') + '">Read post</a>' +
      '</article>';
  }).join('') : '<div class="empty">No city-specific blog posts yet.</div>';

  document.getElementById('crossSection').style.display = 'block';
  document.getElementById('crossLinks').innerHTML = cross.length ? cross.map(function(c){
    return '<a class="city-link" href="/blog/city/' + encodeURIComponent(c.city_slug || '') + '">' + esc(c.city_display || c.city || '') + '</a>';
  }).join('') : '<span class="item-meta">No additional city hubs available.</span>';

  state.style.display = 'none';
}

async function load() {
  var p = params();
  if (!p.city) {
    document.getElementById('state').textContent = 'City guide not found.';
    return;
  }

  try {
    var res = await fetch('/api/blog-posts?city_hub=' + encodeURIComponent(p.city));
    var out = await res.json();
    if (!res.ok || !out || !out.hub) throw new Error((out && out.error) || 'Failed to load city guide');
    renderHub(out.hub);
    track('blog_city_hub_view', { city: out.hub.city || p.city, city_slug: out.hub.city_slug || p.city, refreshed_date: out.hub.refreshed_date || null });
  } catch (err) {
    document.getElementById('state').className = 'empty';
    document.getElementById('state').textContent = 'Unable to load city guide right now.';
    console.error(err);
  }
}

load();
</script>
</body>
</html>
