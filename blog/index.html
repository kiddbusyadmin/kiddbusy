<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>KiddBusy Blog - Weekend Activity Ideas for Parents</title>
<meta name="description" content="Weekend activity ideas, city guides, and practical planning tips for parents looking for kid-friendly things to do." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --sun: #ffcf2f;
  --sky: #4ac6ff;
  --plum: #6c3fc5;
  --tomato: #ff5a5f;
  --cream: #fff8ee;
  --ink: #1a1230;
  --muted: #7b6e8a;
  --card: #ffffff;
  --border: #eee5ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--ink); }
a { color: inherit; text-decoration: none; }
nav {
  position: sticky; top: 0; z-index: 30;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border-bottom: 3px solid var(--border); padding: 16px 24px;
}
.logo { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--plum); }
.logo span { color: var(--tomato); }
.nav-links { display: flex; gap: 18px; list-style: none; font-weight: 800; color: var(--muted); }
.nav-links a:hover { color: var(--plum); }
.hero {
  background: linear-gradient(135deg, #6c3fc5 0%, #4ac6ff 100%);
  color: white; padding: 56px 24px;
}
.hero-wrap { max-width: 980px; margin: 0 auto; }
.hero h1 { font-family: 'Fredoka One', cursive; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 10px; }
.hero p { color: rgba(255,255,255,.9); max-width: 760px; font-size: 1.05rem; }
.container { max-width: 980px; margin: 26px auto 48px; padding: 0 16px; }
.grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.grid.hubs { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 18px; }
.card {
  background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 16px;
  box-shadow: 0 4px 18px rgba(108,63,197,.08);
}
.card:hover { transform: translateY(-1px); }
.meta { color: var(--muted); font-size: .87rem; margin-bottom: 8px; font-weight: 700; }
.title { font-size: 1.12rem; line-height: 1.3; margin-bottom: 8px; color: var(--ink); }
.excerpt { color: #41365c; line-height: 1.5; font-size: .95rem; margin-bottom: 12px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: #f2ebff; color: #4c2f8f; border-radius: 50px; padding: 4px 10px; font-size: .78rem; font-weight: 800; }
.empty, .error { padding: 16px; border-radius: 12px; background: #fff; border: 2px dashed var(--border); color: var(--muted); }
.hub-meta { color: var(--muted); font-size: .8rem; margin-top: 6px; }
</style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Kidd<span>Busy</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/blog/" style="color:var(--plum)">Blog</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-wrap">
      <h1>Weekend Ideas for Busy Parents</h1>
      <p>City guides, planning templates, and practical tips to help you find kid-friendly things to do every weekend.</p>
    </div>
  </section>

  <main class="container">
    <div id="hubsState" class="empty">Loading top city guides...</div>
    <div id="hubsGrid" class="grid hubs" style="display:none"></div>
    <div id="state" class="empty">Loading posts...</div>
    <div id="grid" class="grid" style="display:none"></div>
  </main>

<script>
const SUPABASE_URL = 'https://wgwexzyqaiwosgraaczi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indnd2V4enlxYWl3b3NncmFhY3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODEwNzUsImV4cCI6MjA4ODI1NzA3NX0.IS8u4SL1XeLh9KgD4c2Pl9BiGNg0zkiNauUzu_QtKH8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SESSION_ID = (() => {
  let id = sessionStorage.getItem('kb_session');
  if (!id) {
    id = Math.random().toString(36).slice(2) + Date.now().toString(36);
    sessionStorage.setItem('kb_session', id);
  }
  return id;
})();

function referrerType() {
  var ref = (document.referrer || '').toLowerCase();
  if (!ref) return 'direct';
  if (ref.indexOf('google.') >= 0 || ref.indexOf('bing.') >= 0 || ref.indexOf('duckduckgo.') >= 0 || ref.indexOf('yahoo.') >= 0) return 'search';
  if (ref.indexOf(window.location.hostname) >= 0) return 'internal';
  return 'referral';
}

function track(event, value) {
  sb.from('analytics').insert({
    event: event,
    city: null,
    value: value == null ? null : JSON.stringify(value),
    session_id: SESSION_ID
  }).then(function(){}).catch(function(){});
}

function esc(s) {
  return String(s || '').replace(/[&<>\"']/g, function (c) {
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
  });
}

function formatDate(value) {
  try {
    return new Date(value).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch {
    return value || '';
  }
}

function render(posts) {
  var state = document.getElementById('state');
  var grid = document.getElementById('grid');

  if (!Array.isArray(posts) || posts.length === 0) {
    state.className = 'empty';
    state.textContent = 'No blog posts yet. Check back soon.';
    grid.style.display = 'none';
    return;
  }

  state.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = posts.map(function (p) {
    var tags = Array.isArray(p.tags) ? p.tags.slice(0, 4) : [];
    var cityLabel = String(p.city_display || p.city || '').trim();
    var cityHubUrl = p.city_slug ? ('/blog/city/' + encodeURIComponent(p.city_slug)) : '';
    var metaCity = cityLabel ? (' - ' + (cityHubUrl ? ('<a href=\"' + cityHubUrl + '\">' + esc(cityLabel) + '</a>') : esc(cityLabel))) : '';
    return [
      '<article class="card">',
      '  <div class="meta">' + formatDate(p.published_at) + metaCity + ' - ' + (Number(p.read_minutes) || 4) + ' min read</div>',
      '  <a href="/blog/' + encodeURIComponent(p.slug) + '"><h2 class="title">' + esc(p.title) + '</h2></a>',
      '  <p class="excerpt">' + esc(p.excerpt) + '</p>',
      '  <div class="tags">' + tags.map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>',
      '</article>'
    ].join('');
  }).join('');

  Array.from(grid.querySelectorAll('a[href^="/blog/"]')).forEach(function(a) {
    a.addEventListener('click', function() {
      var href = a.getAttribute('href') || '';
      var slug = href.split('/').filter(Boolean).pop() || '';
      track('blog_post_click', { slug: decodeURIComponent(slug), from: 'blog_index' });
    });
  });
}

function renderHubs(hubs, refreshedDate) {
  var hubsState = document.getElementById('hubsState');
  var hubsGrid = document.getElementById('hubsGrid');
  var rows = Array.isArray(hubs) ? hubs : [];
  if (!rows.length) {
    hubsState.className = 'empty';
    hubsState.textContent = 'Top city guides will appear here shortly.';
    hubsGrid.style.display = 'none';
    return;
  }
  hubsState.style.display = 'none';
  hubsGrid.style.display = 'grid';
  hubsGrid.innerHTML = rows.map(function(h) {
    var display = String(h.city_display || h.city || '').trim();
    var url = String(h.url || ('/blog/city/' + encodeURIComponent(h.city_slug || ''))).trim();
    var listings = h.summary && Number(h.summary.listings_count || 0);
    var events = h.summary && Number(h.summary.events_count || 0);
    var posts = h.summary && Number(h.summary.posts_count || 0);
    return [
      '<article class=\"card\">',
      '  <a href=\"' + esc(url) + '\"><h2 class=\"title\">' + esc(display) + '</h2></a>',
      '  <p class=\"excerpt\">Top local listings, current events, and linked blog guides for families in this city.</p>',
      '  <div class=\"hub-meta\">Listings: ' + listings + ' | Events: ' + events + ' | Posts: ' + posts + '</div>',
      '  <div class=\"hub-meta\">Refreshed: ' + esc(refreshedDate || h.refreshed_date || '') + '</div>',
      '</article>'
    ].join('');
  }).join('');
}

async function load() {
  var state = document.getElementById('state');
  try {
    var responses = await Promise.all([
      fetch('/api/blog-posts?limit=50'),
      fetch('/api/blog-posts?city_hubs=1')
    ]);
    var res = responses[0];
    var hubsRes = responses[1];
    var out = await res.json();
    var hubsOut = await hubsRes.json();
    if (!res.ok) throw new Error(out.error || 'Failed to load blog');
    if (hubsRes.ok && hubsOut && Array.isArray(hubsOut.hubs)) {
      renderHubs(hubsOut.hubs, hubsOut.refreshed_date || '');
    } else {
      renderHubs([], '');
    }
    track('blog_index_view', {
      referrer_type: referrerType(),
      post_count: (out.posts || []).length
    });
    render(out.posts || []);
  } catch (err) {
    state.className = 'error';
    state.textContent = 'Unable to load posts right now.';
    console.error(err);
  }
}

load();
</script>
</body>
</html>
