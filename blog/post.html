<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<script>
(function() {
  try {
    var canonicalUrl = 'https://kiddbusy.com' + window.location.pathname + window.location.search;
    window.__KB_CANONICAL_URL__ = canonicalUrl;
  } catch (e) {
    window.__KB_CANONICAL_URL__ = 'https://kiddbusy.com/blog/';
  }
})();
</script>
<title>KiddBusy Blog</title>
<meta name="description" content="KiddBusy blog post" />
<meta name="robots" content="index,follow,max-image-preview:large" />
<link rel="canonical" href="https://kiddbusy.com/blog/" id="page-canonical" />
<meta property="og:type" content="article" />
<meta property="og:url" content="https://kiddbusy.com/blog/" id="page-og-url" />
<meta property="og:title" content="KiddBusy Blog" />
<meta property="og:description" content="KiddBusy blog post" />
<meta property="og:image" content="https://kiddbusy.com/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="KiddBusy Blog" />
<meta name="twitter:description" content="KiddBusy blog post" />
<meta name="twitter:image" content="https://kiddbusy.com/og-image.png" />
<script>
(function() {
  var url = window.__KB_CANONICAL_URL__ || 'https://kiddbusy.com/blog/';
  var canonical = document.getElementById('page-canonical');
  var ogUrl = document.getElementById('page-og-url');
  if (canonical) canonical.setAttribute('href', url);
  if (ogUrl) ogUrl.setAttribute('content', url);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --plum: #6c3fc5;
  --tomato: #ff5a5f;
  --cream: #fff8ee;
  --ink: #1a1230;
  --muted: #7b6e8a;
  --card: #ffffff;
  --border: #eee5ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--ink); }
a { color: inherit; text-decoration: none; }
nav {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border-bottom: 3px solid var(--border); padding: 16px 24px;
}
.logo { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--plum); }
.logo span { color: var(--tomato); }
.wrap { max-width: 860px; margin: 26px auto 70px; padding: 0 16px; }
.back { display: inline-block; margin-bottom: 16px; color: var(--plum); font-weight: 800; }
.card {
  background: var(--card); border: 2px solid var(--border); border-radius: 16px;
  padding: 22px; box-shadow: 0 4px 18px rgba(108,63,197,.07);
}
.meta { color: var(--muted); font-size: .9rem; margin-bottom: 8px; font-weight: 700; }
h1 { font-family: 'Fredoka One', cursive; line-height: 1.2; margin-bottom: 12px; }
.excerpt { color: #41365c; font-size: 1.05rem; margin-bottom: 16px; }
.content { line-height: 1.72; font-size: 1.02rem; color: #23173d; }
.content h2 { margin: 20px 0 10px; font-size: 1.2rem; color: #2f1f53; }
.content p { margin-bottom: 12px; }
.content ul { padding-left: 18px; margin: 6px 0 12px; }
.content li { margin-bottom: 8px; }
.content a.location-link { color: var(--plum); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; font-weight: 800; }
.state { padding: 14px; background: #fff; border: 2px dashed var(--border); border-radius: 12px; color: var(--muted); }
.cta-line { margin-top: 20px; }
.cta-site {
  display: inline-block; background: var(--plum); color: #fff; border-radius: 999px;
  padding: 10px 16px; font-weight: 800;
}
.cta-site:hover { background: #5730a8; }
.cross-card {
  margin-top: 18px;
  border: 2px solid var(--border);
  border-radius: 16px;
  background:
    radial-gradient(circle at top right, rgba(255,90,95,.08), transparent 32%),
    linear-gradient(180deg, #fbf8ff 0%, #f7f2ff 100%);
  padding: 18px;
}
.cross-kicker {
  font-size: .74rem;
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--tomato);
  margin-bottom: 6px;
}
.cross-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.25rem;
  line-height: 1.2;
  color: #2f1f53;
  margin-bottom: 6px;
}
.cross-intro {
  color: #544774;
  font-size: .95rem;
  margin-bottom: 14px;
}
.cross-groups {
  display: grid;
  gap: 12px;
}
.cross-group {
  background: rgba(255,255,255,.8);
  border: 1px solid #eadfff;
  border-radius: 14px;
  padding: 14px;
}
.cross-group-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.cross-group-title {
  font-weight: 900;
  color: #2f1f53;
}
.cross-group-note {
  font-size: .78rem;
  color: var(--muted);
}
.cross-list {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.cross-item {
  display: block;
  background: #fff;
  border: 1px solid #eee5ff;
  border-radius: 12px;
  padding: 12px 13px;
  transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}
.cross-item:hover {
  transform: translateY(-1px);
  border-color: #d7c4ff;
  box-shadow: 0 8px 18px rgba(108,63,197,.08);
}
.cross-link {
  font-size: .96rem;
  color: #2f1f53;
  font-weight: 900;
  line-height: 1.35;
}
.cross-item:hover .cross-link { color: var(--plum); }
.cross-muted {
  font-size: .82rem;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.45;
}
@media (max-width: 640px) {
  .cross-card { padding: 16px; }
  .cross-group { padding: 12px; }
  .cross-list { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Kidd<span>Busy</span></a>
    <a href="/blog/" style="font-weight:800;color:var(--plum)">Blog</a>
  </nav>

  <main class="wrap">
    <a href="/blog/" class="back">Back to blog</a>
    <div id="state" class="state">Loading post...</div>
    <article id="article" class="card" style="display:none">
      <div id="meta" class="meta"></div>
      <h1 id="title"></h1>
      <p id="excerpt" class="excerpt"></p>
      <div id="content" class="content"></div>
      <div id="cityHubCrosslinks" class="cross-card" style="display:none"></div>
      <div class="cta-line"><a class="cta-site" href="/" id="blogToSiteCta">Find Activities in Your City</a></div>
    </article>
  </main>

<script>
const SUPABASE_URL = 'https://wgwexzyqaiwosgraaczi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indnd2V4enlxYWl3b3NncmFhY3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODEwNzUsImV4cCI6MjA4ODI1NzA3NX0.IS8u4SL1XeLh9KgD4c2Pl9BiGNg0zkiNauUzu_QtKH8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SESSION_ID = (() => {
  let id = sessionStorage.getItem('kb_session');
  if (!id) {
    id = Math.random().toString(36).slice(2) + Date.now().toString(36);
    sessionStorage.setItem('kb_session', id);
  }
  return id;
})();
var __blogState = { slug: '', city: null, trackedScroll: false, tracked30s: false };

function referrerType() {
  var ref = (document.referrer || '').toLowerCase();
  if (!ref) return 'direct';
  if (ref.indexOf('google.') >= 0 || ref.indexOf('bing.') >= 0 || ref.indexOf('duckduckgo.') >= 0 || ref.indexOf('yahoo.') >= 0) return 'search';
  if (ref.indexOf(window.location.hostname) >= 0) return 'internal';
  return 'referral';
}

function analyticsSource() {
  try {
    if (navigator.webdriver) return 'internal';
    var host = String(window.location.hostname || '').toLowerCase();
    if (host.endsWith('.netlify.app') || host === 'localhost' || host === '127.0.0.1') return 'internal';
  } catch (_) {}
  return 'public';
}

function isInternalTraffic() {
  return analyticsSource() === 'internal';
}

async function postPublicWrite(action, payload) {
  var res = await fetch('/api/public-write', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ action: action }, payload || {}))
  });
  var text = await res.text();
  var data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch (_) {
    data = { error: text || ('Request failed (' + res.status + ')') };
  }
  if (!res.ok || (data && data.error)) {
    throw new Error((data && data.error) ? data.error : ('Request failed (' + res.status + ')'));
  }
  return data || {};
}

function track(event, city, value) {
  postPublicWrite('track_analytics', {
    event: event,
    city: city || null,
    value: value == null ? null : JSON.stringify(value),
    session_id: SESSION_ID,
    is_internal: isInternalTraffic(),
    source: analyticsSource(),
    user_agent: navigator.userAgent || null,
    path: window.location.pathname || null
  }).catch(function(){});
}

function params() {
  var qp = new URLSearchParams(window.location.search);
  var slug = qp.get('slug');
  if (!slug) {
    var m = window.location.pathname.match(/^\/blog\/([^/]+)$/);
    if (m) slug = decodeURIComponent(m[1]);
  }
  return { slug: slug || '' };
}

function safeText(s) {
  return String(s || '').replace(/[&<>\"']/g, function (c) {
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
  });
}

function safeBody(html) {
  var val = String(html || '');
  return val
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/on\w+\s*=\s*"[^"]*"/gi, '')
    .replace(/on\w+\s*=\s*'[^']*'/gi, '');
}

function upsertMeta(selector, attr, value) {
  if (!value) return;
  var el = document.querySelector(selector);
  if (!el) {
    if (selector.indexOf('meta[') === 0) {
      el = document.createElement('meta');
      var nameMatch = selector.match(/name=\"([^\"]+)\"/i);
      var propMatch = selector.match(/property=\"([^\"]+)\"/i);
      if (nameMatch && nameMatch[1]) el.setAttribute('name', nameMatch[1]);
      if (propMatch && propMatch[1]) el.setAttribute('property', propMatch[1]);
      document.head.appendChild(el);
    } else if (selector === 'link[rel="canonical"]') {
      el = document.createElement('link');
      el.setAttribute('rel', 'canonical');
      document.head.appendChild(el);
    }
  }
  if (el) el.setAttribute(attr, value);
}

function escapeRegExp(value) {
  return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function normalizeWebsiteUrl(raw) {
  var value = String(raw || '').trim();
  if (!value) return '';
  if (/^https?:\/\//i.test(value)) return value;
  if (/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(value)) return 'https://' + value;
  return '';
}

function splitCityName(city) {
  return String(city || '').split(',')[0].trim();
}

async function fetchCityListingsWithWebsites(city) {
  var cityName = splitCityName(city);
  if (!cityName) return [];
  var res = await sb
    .from('listings')
    .select('name,website')
    .eq('status', 'active')
    .ilike('city', cityName)
    .not('website', 'is', null)
    .limit(300);
  if (res.error || !Array.isArray(res.data)) return [];
  var rows = [];
  for (var i = 0; i < res.data.length; i += 1) {
    var row = res.data[i] || {};
    var name = String(row.name || '').trim();
    var website = normalizeWebsiteUrl(row.website);
    if (!name || !website) continue;
    rows.push({ name: name, website: website });
  }
  rows.sort(function(a, b) { return b.name.length - a.name.length; });
  return rows;
}

function shouldSkipNode(node) {
  var p = node && node.parentNode ? node.parentNode : null;
  while (p && p.nodeType === 1) {
    var tag = String(p.tagName || '').toLowerCase();
    if (tag === 'a' || tag === 'script' || tag === 'style' || tag === 'code') return true;
    p = p.parentNode;
  }
  return false;
}

function linkListingMentions(container, listings) {
  if (!container || !listings || !listings.length) return;
  var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  var nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  for (var n = 0; n < nodes.length; n += 1) {
    var node = nodes[n];
    if (!node || !node.nodeValue || shouldSkipNode(node)) continue;
    var text = String(node.nodeValue || '');
    var replaced = false;
    var frag = document.createDocumentFragment();
    var cursor = 0;

    while (cursor < text.length) {
      var nearest = null;
      for (var i = 0; i < listings.length; i += 1) {
        var item = listings[i];
        var rx = new RegExp('(^|[^A-Za-z0-9])(' + escapeRegExp(item.name) + ')(?=$|[^A-Za-z0-9])', 'i');
        var slice = text.slice(cursor);
        var m = slice.match(rx);
        if (!m || typeof m.index !== 'number') continue;
        var idx = cursor + m.index;
        var whole = m[0];
        var lead = m[1] || '';
        var matchedName = whole.slice(lead.length);
        if (!nearest || idx < nearest.idx || (idx === nearest.idx && matchedName.length > nearest.name.length)) {
          nearest = { idx: idx, lead: lead, name: matchedName, website: item.website, len: whole.length };
        }
      }

      if (!nearest) {
        frag.appendChild(document.createTextNode(text.slice(cursor)));
        break;
      }

      if (nearest.idx > cursor) frag.appendChild(document.createTextNode(text.slice(cursor, nearest.idx)));
      if (nearest.lead) frag.appendChild(document.createTextNode(nearest.lead));

      var a = document.createElement('a');
      a.className = 'location-link';
      a.href = nearest.website;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = nearest.name;
      frag.appendChild(a);

      cursor = nearest.idx + nearest.len;
      replaced = true;
    }

    if (replaced) node.parentNode.replaceChild(frag, node);
  }
}

function formatDate(value) {
  try {
    return new Date(value).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  } catch {
    return value || '';
  }
}

function renderCityHubCrosslinks(hub, currentSlug) {
  var el = document.getElementById('cityHubCrosslinks');
  if (!el) return;
  var relatedPosts = Array.isArray(hub && hub.related_posts) ? hub.related_posts : [];
  var latestEvents = Array.isArray(hub && hub.latest_events) ? hub.latest_events : [];
  var relatedHubs = Array.isArray(hub && hub.related_city_hubs) ? hub.related_city_hubs : [];
  var topListings = Array.isArray(hub && hub.top_listings) ? hub.top_listings : [];
  var cityDisplay = String((hub && hub.city_display) || (hub && hub.city) || '').trim();
  var citySlug = String((hub && hub.city_slug) || '').trim();
  if (!cityDisplay || !citySlug) {
    el.style.display = 'none';
    return;
  }

  function renderGroup(title, note, itemsHtml) {
    if (!itemsHtml) return '';
    return '<section class=\"cross-group\">' +
      '<div class=\"cross-group-head\">' +
      '<div class=\"cross-group-title\">' + safeText(title) + '</div>' +
      (note ? '<div class=\"cross-group-note\">' + safeText(note) + '</div>' : '') +
      '</div>' +
      '<div class=\"cross-list\">' + itemsHtml + '</div>' +
      '</section>';
  }

  function renderItem(href, label, muted, external) {
    return '<a class=\"cross-item\" href=\"' + safeText(href || '#') + '\"' +
      (external ? ' target=\"_blank\" rel=\"noopener noreferrer\"' : '') + '>' +
      '<div class=\"cross-link\">' + safeText(label || '') + '</div>' +
      (muted ? '<div class=\"cross-muted\">' + safeText(muted) + '</div>' : '') +
      '</a>';
  }

  var groups = [];
  groups.push(renderGroup(
    'City guide',
    'Start here',
    renderItem('/blog/city/' + encodeURIComponent(citySlug), cityDisplay + ' landing page', 'Top listings, latest events, and local posts', false)
  ));

  if (topListings.length) {
    groups.push(renderGroup('Official websites', 'Top local spots', topListings.slice(0, 6).map(function(r) {
      var w = String((r && r.website) || '').trim();
      if (!w) return '';
      return renderItem(w, r.name || '', r.category || '', true);
    }).filter(Boolean).join('')));
  }

  if (latestEvents.length) {
    groups.push(renderGroup('Event links', 'Fresh local activity', latestEvents.slice(0, 6).map(function(e) {
      return renderItem(e.source_url || '#', e.name || '', e.start_date || '', true);
    }).join('')));
  }

  if (relatedPosts.length) {
    groups.push(renderGroup('Related reads', 'More local ideas', relatedPosts.slice(0, 8).filter(function(p) {
      return String(p.slug || '').trim() && String(p.slug || '').trim() !== String(currentSlug || '').trim();
    }).map(function(p) {
      return renderItem('/blog/' + encodeURIComponent(p.slug || ''), p.title || '', (p.city_display || p.city || ''), false);
    }).join('')));
  }

  if (relatedHubs.length) {
    groups.push(renderGroup('Other city guides', 'Keep exploring', relatedHubs.slice(0, 8).map(function(c) {
      return renderItem('/blog/city/' + encodeURIComponent(c.city_slug || ''), c.city_display || c.city || '', 'City landing page', false);
    }).join('')));
  }

  el.innerHTML = '<div class=\"cross-kicker\">Explore Further</div>' +
    '<div class=\"cross-title\">Keep exploring ' + safeText(cityDisplay) + '</div>' +
    '<div class=\"cross-intro\">Jump to the city guide, official websites, upcoming events, and more related reading without digging through a messy link list.</div>' +
    '<div class=\"cross-groups\">' + groups.filter(Boolean).join('') + '</div>';
  el.style.display = 'block';
}

async function load() {
  var state = document.getElementById('state');
  var article = document.getElementById('article');
  var p = params();
  if (!p.slug) {
    state.textContent = 'Post not found.';
    return;
  }

  try {
    var res = await fetch('/api/blog-posts?slug=' + encodeURIComponent(p.slug));
    var out = await res.json();
    if (!res.ok || !out.post) throw new Error(out.error || 'Not found');
    var post = out.post;
    __blogState.slug = String(post.slug || p.slug || '');
    __blogState.city = post.city_display || post.city || null;
    var rType = referrerType();

    document.title = post.title + ' | KiddBusy Blog';
    var desc = document.querySelector('meta[name="description"]');
    if (desc) desc.setAttribute('content', post.seo_description || post.excerpt || 'KiddBusy blog post');

    var cityLabel = String(post.city_display || post.city || '').trim();
    document.getElementById('meta').textContent = formatDate(post.published_at) + (cityLabel ? (' - ' + cityLabel) : '') + ' - ' + (Number(post.read_minutes) || 4) + ' min read';
    document.getElementById('title').textContent = post.title || 'KiddBusy Blog';
    document.getElementById('excerpt').textContent = post.excerpt || '';
    var contentEl = document.getElementById('content');
    contentEl.innerHTML = safeBody(post.body_html || '');
    try {
      var cityListings = await fetchCityListingsWithWebsites(post.city || '');
      linkListingMentions(contentEl, cityListings);
    } catch (_) {}
    try {
      var hubRes = await fetch('/api/blog-posts?city_hub=' + encodeURIComponent(post.city || cityLabel || '') + '&current_slug=' + encodeURIComponent(post.slug || ''));
      var hubOut = await hubRes.json();
      if (hubRes.ok && hubOut && hubOut.hub) {
        renderCityHubCrosslinks(hubOut.hub, post.slug || '');
      }
    } catch (_) {}

    var canonicalUrl = 'https://kiddbusy.com/blog/' + encodeURIComponent(post.slug);
    upsertMeta('link[rel="canonical"]', 'href', canonicalUrl);
    upsertMeta('meta[property="og:url"]', 'content', canonicalUrl);
    upsertMeta('meta[property="og:title"]', 'content', post.title || 'KiddBusy Blog');
    upsertMeta('meta[property="og:description"]', 'content', post.seo_description || post.excerpt || 'KiddBusy blog post');
    upsertMeta('meta[name="twitter:title"]', 'content', post.title || 'KiddBusy Blog');
    upsertMeta('meta[name="twitter:description"]', 'content', post.seo_description || post.excerpt || 'KiddBusy blog post');

    var analyticsCity = __blogState.city;
    track('blog_post_view', analyticsCity, {
      slug: __blogState.slug,
      referrer_type: rType,
      organic_referrer: rType === 'search'
    });

    setTimeout(function() {
      if (__blogState.tracked30s || document.hidden) return;
      __blogState.tracked30s = true;
      track('blog_post_engaged_30s', analyticsCity, { slug: __blogState.slug });
    }, 30000);

    document.getElementById('blogToSiteCta').addEventListener('click', function() {
      track('blog_to_home_click', analyticsCity, { slug: __blogState.slug });
    });

    document.getElementById('content').addEventListener('click', function(e) {
      var link = e.target && e.target.closest ? e.target.closest('a') : null;
      if (!link) return;
      var href = String(link.getAttribute('href') || '');
      if (/^https?:\/\//i.test(href) && href.indexOf(window.location.hostname) === -1) {
        track('blog_outbound_click', analyticsCity, { slug: __blogState.slug, href: href.slice(0, 240) });
      }
    });

    state.style.display = 'none';
    article.style.display = 'block';
  } catch (err) {
    state.textContent = 'Unable to load this post right now.';
    console.error(err);
  }
}

window.addEventListener('scroll', function() {
  if (__blogState.trackedScroll || !__blogState.slug) return;
  var scrolled = window.scrollY + window.innerHeight;
  var total = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
  if (total <= 0) return;
  if ((scrolled / total) >= 0.75) {
    __blogState.trackedScroll = true;
    track('blog_scroll_75', __blogState.city, { slug: __blogState.slug });
  }
}, { passive: true });

load();
</script>
</body>
