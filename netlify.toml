[build]
  publish = "."
  functions = "netlify/functions"

[functions.search]
  timeout = 60

[functions.agent-proxy]
  timeout = 60

[functions.send-email]
  timeout = 30

[functions.db-proxy]
  timeout = 30

[functions.photo-admin]
  timeout = 30

[functions.owner-claims]
  timeout = 30

[functions.owner-leads-enrich]
  timeout = 900

[functions.cmo-config]
  timeout = 30

[functions.unsubscribe]
  timeout = 30

[functions.blog-posts]
  timeout = 30

# Daily cache warm — runs at 3am ET (8am UTC)
[functions.daily-cache-warm]
  schedule = "0 8 * * *"
  timeout = 900

# Autonomous agent — runs every morning at 9am ET (2pm UTC)
[functions.agent-scheduled]
  schedule = "0 14 * * *"
  timeout = 900

# CMO blog writer — runs every 20 minutes to build daily queue target safely
[functions.cmo-blog-run]
  schedule = "*/20 * * * *"
  timeout = 30

[[redirects]]
  from = "/api/cmo-config"
  to = "/.netlify/functions/cmo-config"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

[[redirects]]
  from = "/api/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/warm"
  to = "/.netlify/functions/daily-cache-warm"
  status = 200

[[redirects]]
  from = "/api/agent-run"
  to = "/.netlify/functions/agent-scheduled"
  status = 200

[[redirects]]
  from = "/api/photo-admin"
  to = "/.netlify/functions/photo-admin"
  status = 200

[[redirects]]
  from = "/api/owner-claims"
  to = "/.netlify/functions/owner-claims"
  status = 200

[[redirects]]
  from = "/api/owner-leads-enrich"
  to = "/.netlify/functions/owner-leads-enrich"
  status = 200

[[redirects]]
  from = "/api/blog-posts"
  to = "/.netlify/functions/blog-posts"
  status = 200

[[redirects]]
  from = "/api/cmo-blog-run"
  to = "/.netlify/functions/cmo-blog-run"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/blog/:slug"
  to = "/blog/post.html?slug=:slug"
  status = 200
