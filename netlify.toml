[build]
  publish = "."
  functions = "netlify/functions"

[functions.search]
  timeout = 60

[functions.agent-proxy]
  timeout = 60

[functions.agent-router]
  timeout = 60

[functions.agent-org]
  timeout = 30

[functions.send-email]
  timeout = 30

[functions.submit-listing]
  timeout = 30

[functions.db-proxy]
  timeout = 30

[functions.photo-admin]
  timeout = 30

[functions.owner-claims]
  timeout = 30

[functions.owner-leads-enrich]
  timeout = 900

[functions.cmo-config]
  timeout = 30

[functions.cmo-social]
  timeout = 30

[functions.unsubscribe]
  timeout = 30

[functions.blog-posts]
  timeout = 60

[functions.geo-city]
  timeout = 10

[functions.image-generate]
  timeout = 60

[functions.brand-image-kit]
  timeout = 120

[functions.accountant-agent]
  timeout = 30

[functions.api-usage]
  timeout = 30

[functions.sponsor-banners]
  timeout = 30

[functions.stripe-webhook]
  timeout = 30

[functions.revenue-consensus]
  timeout = 60

[functions.sitemap]
  timeout = 30

# Cache warm — runs hourly; each run handles a deterministic city bucket so all supported cities refresh about every 3h
[functions.daily-cache-warm]
  schedule = "0 * * * *"
  timeout = 900

# Autonomous agent — runs every morning at 9am ET (2pm UTC)
[functions.agent-scheduled]
  schedule = "0 14 * * *"
  timeout = 900

# CMO blog writer — manual API run
[functions.cmo-blog-run]
  timeout = 30

# CMO blog writer — scheduled queue builder/distributor
[functions.cmo-blog-scheduled]
  schedule = "*/20 * * * *"
  timeout = 30

# Accountant agent snapshot — runs nightly at 1am ET (6am UTC)
[functions.accountant-scheduled]
  schedule = "0 6 * * *"
  timeout = 30

# Daily CMO + Accountant consensus brief — runs at 9:30am ET (14:30 UTC)
[functions.revenue-consensus-scheduled]
  schedule = "30 14 * * *"
  timeout = 60

# Sponsorship claim nurture — runs hourly to follow up blocked sponsorships
[functions.sponsorship-claim-nurture]
  schedule = "15 * * * *"
  timeout = 30

