[build]
  publish = "."
  functions = "netlify/functions"

[functions.search]
  timeout = 60

# Daily cache warm — runs at 3am ET (8am UTC)
[functions.daily-cache-warm]
  schedule = "0 8 * * *"
  timeout = 900

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/warm"
  to = "/.netlify/functions/daily-cache-warm"
  status = 200
