[build]
  publish = "."
  functions = "netlify/functions"

[functions.search]
  timeout = 60

[functions.agent-proxy]
  timeout = 60

[functions.send-email]
  timeout = 30

[functions.db-proxy]
  timeout = 30

[functions.photo-admin]
  timeout = 30

[functions.owner-claims]
  timeout = 30

[functions.owner-leads-enrich]
  timeout = 900

[functions.cmo-config]
  timeout = 30

[functions.unsubscribe]
  timeout = 30

[functions.blog-posts]
  timeout = 30

[functions.geo-city]
  timeout = 10

[functions.image-generate]
  timeout = 60

[functions.accountant-agent]
  timeout = 30

[functions.api-usage]
  timeout = 30

[functions.sponsor-banners]
  timeout = 30

[functions.revenue-consensus]
  timeout = 60

# Daily cache warm — runs at 3am ET (8am UTC)
[functions.daily-cache-warm]
  schedule = "0 8 * * *"
  timeout = 900

# Autonomous agent — runs every morning at 9am ET (2pm UTC)
[functions.agent-scheduled]
  schedule = "0 14 * * *"
  timeout = 900

# CMO blog writer — manual API run
[functions.cmo-blog-run]
  timeout = 30

# CMO blog writer — scheduled queue builder/distributor
[functions.cmo-blog-scheduled]
  schedule = "*/20 * * * *"
  timeout = 30

# Accountant agent snapshot — runs nightly at 1am ET (6am UTC)
[functions.accountant-scheduled]
  schedule = "0 6 * * *"
  timeout = 30

# Daily CMO + Accountant consensus brief — runs at 9:30am ET (14:30 UTC)
[functions.revenue-consensus-scheduled]
  schedule = "30 14 * * *"
  timeout = 60

[[redirects]]
  from = "/api/cmo-config"
  to = "/.netlify/functions/cmo-config"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

